{% extends "base.html" %}
{% block title %}Sign in{% endblock %}
{% block navbar %}{% endblock %}

{% block content %}
<div class="authShell">
  <div class="authCard">
    <h1>Sign in</h1>
    <p class="pageSub">Use your username and password to access the review system.</p>

    <form method="POST" action="{{ url_for('index') }}" class="stackForm">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>

      <button type="submit">Sign in</button>
    </form>

    <div class="authLinks">
      <a href="{{ url_for('set_password') }}">Set password with a one-time code</a>
      <a href="{{ url_for('reset_password') }}">Reset password with a one-time code</a>
    </div>
  </div>
</div>
{% endblock %}
